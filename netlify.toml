[build]
  command = "yarn build-landing && yarn build-candidate && yarn build-admin"
  publish = "dist/apps/video-cv"

[context.production.environment]
  GENERATE_SOURCEMAP = "true"

[[redirects]]
  from = "/account"
  to = "/account/index.html"
  status = 200

[[redirects]]
  from = "/employer/*"
  to = "/employer/index.html"
  status = 200

[[redirects]]
  from = "/professional/*"
  to = "/professional/index.html"
  status = 200

[[redirects]]
  from = "/vcadmin/*"
  to = "/vcadmin/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200